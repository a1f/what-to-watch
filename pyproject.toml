[project]
name = "what-to-watch-api"
version = "0.1.0"
description = "FastAPI backend for What to Watch (heartbeat, DB connectivity, migrations)."
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn>=0.30",
    "sqlalchemy>=2.0",
    "alembic>=1.13",
    "pydantic-settings>=2.4",
    "psycopg[binary]>=3.2",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-cov>=5.0",
    "httpx>=0.27",
    "mypy>=1.11",
    "ruff>=0.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["api"]

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "C4", "UP", "SIM", "PIE", "RUF", "DTZ", "PTH", "ASYNC"]

[tool.ruff.lint.per-file-ignores]
# Alembic's script template always emits `op`/`sa` imports; autogenerated
# revisions that use only one would otherwise trip F401 (mirrors the mypy exclude).
"api/alembic/versions/*" = ["F401"]

[tool.mypy]
strict = true
python_version = "3.12"
plugins = ["pydantic.mypy"]
exclude = ['^api/alembic/']

[[tool.mypy.overrides]]
module = ["alembic.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["api/tests"]
filterwarnings = ["error"]

# Branch coverage is a diagnostic (run `pytest --cov`), never a gate target,
# so no --cov in addopts and no fail-under threshold.
[tool.coverage.run]
branch = true
source = ["api"]

[tool.coverage.report]
show_missing = true
